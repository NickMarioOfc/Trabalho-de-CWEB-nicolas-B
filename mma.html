<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infográfico sobre MMA</title>
    <style>
        body {
            background-color: #fcf9f2;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .titulo-pdf {
            background-color: #000000;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .container-imagem {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
        }

        .infografico-img {
            width: 100%;
            height: auto;
            border: 2px solid #333333;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>

    <div class="titulo-pdf">
        Infográfico sobre MMA: história e golpes
    </div>

    <div class="container-imagem">
        <img src="mma.png" alt="Infográfico sobre MMA: história e golpes" class="infografico-img">
    </div>

</body>
</html>
